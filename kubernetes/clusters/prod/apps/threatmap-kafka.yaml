apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: threatmap-kafka
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: kafka
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: kafka-cluster-app
  path: ./kubernetes/apps/threatmap/kafka/base
  prune: true
  wait: true
