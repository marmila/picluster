apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: threatmap-app
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: threatmap
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: external-secrets-config
    - name: mongodb-community-operator-app
    - name: threatmap-kafka
    - name: envoy-gateway-app
    - name: longhorn-app
  path: ./kubernetes/apps/threatmap/app/overlays/prod
  prune: true
  wait: false
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
