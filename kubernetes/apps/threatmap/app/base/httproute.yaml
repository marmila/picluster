apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: threatmap
spec:
  hostnames:
    - threatmap.${CLUSTER_DOMAIN}
  parentRefs:
    - name: public-gateway
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /ws
        - path:
            type: PathPrefix
            value: /docs
        - path:
            type: PathPrefix
            value: /redoc
        - path:
            type: PathPrefix
            value: /openapi.json
      backendRefs:
        - name: threatmap-backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: threatmap-frontend
          port: 80
