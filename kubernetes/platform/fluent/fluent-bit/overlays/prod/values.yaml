# fluent-bit helm values (prod overlay)

# Resource limits for the fluent-bit DaemonSet
# Actual usage: 19-62m CPU typical, up to 629m on spike; 30-161Mi memory
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 15
  failureThreshold: 10

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
