# fluent-bit helm values (prod overlay)

resources:
  requests:
    memory: 64Mi
    cpu: 50m
  limits:
    memory: 256Mi

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
