apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: full
spec:
  schedule: "0 2 * * *"
  template:
    hooks: {}
    includedNamespaces:
    - '*'
    includedResources:
    - '*'
    includeClusterResources: true
    metadata:
      labels:
        type: 'full'
        schedule: 'daily'
    ttl: 168h0m0s
