apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apex-forge

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - deployment.yaml
  - deployment-api.yaml
  - apexforge-api-rbac.yaml
  - apexforge-api-service.yaml
  - apexforge-collector-service.yaml
  - external-secret.yaml
  - external-secret-virustotal.yaml
  - service-monitor.yaml
  - ingress.yaml

configMapGenerator:
  - name: apexforge-config
    literals:
      - INTERVAL_SECONDS=3600
      - LOG_LEVEL=INFO
      - VT_DAILY_BUDGET=450
      - VT_RATE_LIMIT_PER_MIN=4
      - VT_CACHE_TTL_HOURS=168
      - VT_PRIORITY_ONLY=true
      - ABUSEIPDB_DAILY_BUDGET=900
      - ABUSEIPDB_CACHE_TTL_HOURS=24
      # Ports nmap scans; override with 1-65535 for full scan. EnvFrom in deployment picks this up.
      - NMAP_PORTS=21,22,23,25,53,80,110,111,135,139,143,443,445,587,993,995,1433,1521,2049,3306,3389,5432,5672,5900,6379,6443,8000,8080,8443,8888,9000,9200,9443,10250,11211,15672,27017,27018
