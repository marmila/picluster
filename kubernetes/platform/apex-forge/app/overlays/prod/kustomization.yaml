apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: ghcr.io/marmila/apex-forge
    newTag: 13.0.7

configMapGenerator:
  - name: apexforge-config
    behavior: merge
    literals:
      - INTERVAL_SECONDS=864000
      - LOG_LEVEL=INFO

      - NMAP_PORTS=21,22,23,53,80,443,445,993,995,3306,3389,5432,8080,8443,9000
