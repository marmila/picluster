apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: ghcr.io/marmila/apex-forge
    newTag: 13.0.6

configMapGenerator:
  - name: apexforge-config
    behavior: merge
    literals:
      - INTERVAL_SECONDS=864000
      - LOG_LEVEL=INFO
      # Ports nmap scans; override with 1-65535 for full scan. EnvFrom in deployment picks this up.
      - NMAP_PORTS=21,22,23,25,53,80,110,111,135,139,143,443,445,587,993,995,1433,1521,2049,3306,3389,5432,5672,5900,6379,6443,8000,8080,8443,8888,9000,9200,9443,10250,11211,15672,27017,27018

