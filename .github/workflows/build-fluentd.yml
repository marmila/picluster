name: Build fluentd image

on:
  push:
    branches: [master]
    paths:
      - docker/fluentd/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker/fluentd
          push: true
          tags: ghcr.io/marmila/fluentd-aggregator:v1.18-kafka
