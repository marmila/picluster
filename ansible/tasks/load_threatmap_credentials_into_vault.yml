    token: "{{ vault_token }}"
    validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
    ca_cert: "{{ vault_cacert | default(omit) }}"
    path: "secret/data/threatmap/maxmind"
    data:
      data:
        license_key: "{{ threatmap_maxmind_license_key }}"
        account_id: "{{ threatmap_maxmind_account_id }}"
  no_log: true
  when: >
    threatmap_maxmind_vault_secret.failed or
    (threatmap_maxmind_vault_secret.secret | default({})).license_key | default('') | length == 0 or
    (threatmap_maxmind_vault_secret.secret | default({})).account_id | default('') | length == 0

# MONGODB PASSWORD (auto-generated) -----------------------------------------

- name: Check if MongoDB password already exists in Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
    ca_cert: "{{ vault_cacert | default(omit) }}"
    mount_point: secret
    path: threatmap/mongodb
  register: threatmap_mongo_vault_secret
  failed_when: false

- name: Set fact — existing MongoDB password from Vault
  ansible.builtin.set_fact:
    threatmap_mongo_password: "{{ (threatmap_mongo_vault_secret.secret | default({})).password }}"
  when:
    - not threatmap_mongo_vault_secret.failed
    - (threatmap_mongo_vault_secret.secret | default({})).password | default('') | length > 0
  no_log: true

- name: Generate new MongoDB password when not found in Vault
  ansible.builtin.set_fact:
    threatmap_mongo_password: >-
      {{ lookup('ansible.builtin.password', '/dev/null', length=32, chars=['ascii_letters', 'digits']) }}
  when: >
    threatmap_mongo_vault_secret.failed or
    (threatmap_mongo_vault_secret.secret | default({})).password | default('') | length == 0
  no_log: true

- name: Store MongoDB password in Vault
  community.hashi_vault.vault_write:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
    ca_cert: "{{ vault_cacert | default(omit) }}"
    path: "secret/data/threatmap/mongodb"
    data:
      data:
        password: "{{ threatmap_mongo_password }}"
  no_log: true
  when: >
    threatmap_mongo_vault_secret.failed or
    (threatmap_mongo_vault_secret.secret | default({})).password | default('') | length == 0

# KAFKA CREDENTIALS (auto-generated) ----------------------------------------

- name: Check if Kafka threatmap credentials exist in Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
    ca_cert: "{{ vault_cacert | default(omit) }}"
    mount_point: secret
    path: kafka/threatmap
  register: kafka_threatmap_vault_secret
  failed_when: false

- name: Set fact — existing Kafka threatmap password from Vault
  ansible.builtin.set_fact:
    kafka_threatmap_password: "{{ (kafka_threatmap_vault_secret.secret | default({})).password }}"
  when:
    - not kafka_threatmap_vault_secret.failed
    - (kafka_threatmap_vault_secret.secret | default({})).password | default('') | length > 0
  no_log: true

- name: Generate new Kafka threatmap password when not found in Vault
  ansible.builtin.set_fact:
    kafka_threatmap_password: >-
      {{ lookup('ansible.builtin.password', '/dev/null', length=32, chars=['ascii_letters', 'digits']) }}
  when: >
    kafka_threatmap_vault_secret.failed or
    (kafka_threatmap_vault_secret.secret | default({})).password | default('') | length == 0
  no_log: true

- name: Store Kafka threatmap credentials in Vault
  community.hashi_vault.vault_write:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
    ca_cert: "{{ vault_cacert | default(omit) }}"
    path: "secret/data/kafka/threatmap"
    data:
      data:
        username: "threatmap-backend"
        password: "{{ kafka_threatmap_password }}"
  no_log: true
  when: >
    kafka_threatmap_vault_secret.failed or
    (kafka_threatmap_vault_secret.secret | default({})).password | default('') | length == 0

- name: Create Kafka user secret in kafka namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: threatmap-backend-kafka-secret
        namespace: kafka
      type: Opaque
      stringData:
        password: "{{ kafka_threatmap_password }}"
  no_log: true
