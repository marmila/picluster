    prompt: |
      MaxMind account ID not found in Vault.
      Find it at: maxmind.com → top-left of the portal (e.g. Account (ID: 1363037))
      Enter MaxMind account ID
  register: maxmind_account_id_input
  when: threatmap_maxmind_account_id | length == 0

- name: Set fact — MaxMind account ID from prompt
  ansible.builtin.set_fact:
    threatmap_maxmind_account_id: "{{ maxmind_account_id_input.user_input }}"
  no_log: true
  when: threatmap_maxmind_account_id | length == 0

- name: Store MaxMind credentials in Vault
  community.hashi_vault.vault_write:
