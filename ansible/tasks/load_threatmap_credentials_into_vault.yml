---
# ABUSEIPDB API KEY ----------------------------------------------------------

- name: Check if AbuseIPDB API key exists in Vault
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
    ca_cert: "{{ vault_cacert | default(omit) }}"
    mount_point: secret
    path: threatmap/abuseipdb
  register: threatmap_abuseipdb_vault_secret
  failed_when: false

- name: Set fact — existing AbuseIPDB API key from Vault
  ansible.builtin.set_fact:
    threatmap_abuseipdb_api_key: "{{ (threatmap_abuseipdb_vault_secret.secret | default({})).api_key | default('') }}"
  no_log: true

- name: Prompt for AbuseIPDB API key (not found in Vault)
  ansible.builtin.pause:
    prompt: |
      AbuseIPDB API key not found in Vault.
      Get it from: abuseipdb.com → API → Your API Key
      Enter AbuseIPDB API key
  register: abuseipdb_api_key_input
  when: threatmap_abuseipdb_api_key | length == 0

- name: Set fact — AbuseIPDB API key from prompt
  ansible.builtin.set_fact:
    threatmap_abuseipdb_api_key: "{{ abuseipdb_api_key_input.user_input }}"
  no_log: true
  when: threatmap_abuseipdb_api_key | length == 0

- name: Store AbuseIPDB API key in Vault
  community.hashi_vault.vault_write:
    url: "{{ vault_addr }}"
    token: "{{ vault_token }}"
    validate_certs: "{{ not (enable_letsencrypt | default(false)) }}"
    ca_cert: "{{ vault_cacert | default(omit) }}"
    path: "secret/data/threatmap/abuseipdb"
    data:
      data:
        api_key: "{{ threatmap_abuseipdb_api_key }}"
  no_log: true
  when: >
    threatmap_abuseipdb_vault_secret.failed or
    (threatmap_abuseipdb_vault_secret.secret | default({})).api_key | default('') | length == 0

