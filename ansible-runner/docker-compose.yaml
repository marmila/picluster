services:
  ansible-runner:
    image: ansible-runner
    build:
      context: ..
      dockerfile: ansible-runner/Dockerfile
    network_mode: host
    extra_hosts:
      - "vault.homelab.marmilan.com:10.0.0.11"
    command: >
      bash -c "sudo cp /tmp/ssh/id_rsa /home/runner/.ssh/id_rsa &&
               sudo cp /tmp/ssh/id_rsa.pub /home/runner/.ssh/id_rsa.pub &&
               sudo chown runner:runner /home/runner/.ssh/id_rsa /home/runner/.ssh/id_rsa.pub &&
               chmod 600 /home/runner/.ssh/id_rsa &&
               chmod 644 /home/runner/.ssh/id_rsa.pub &&
               tail -f /dev/null"
    container_name: ansible-runner
    restart: unless-stopped
    volumes:
      - ./../ansible:/ansible
      - ./../kubernetes:/kubernetes
      - ./../terraform:/terraform
      - ./../metal/x86/pxe-files:/metal/x86/pxe-files
      - ${HOME}/.secrets:/home/runner/.secrets
      - ${HOME}/.ssh/id_rsa:/tmp/ssh/id_rsa:ro
      - ${HOME}/.ssh/id_rsa.pub:/tmp/ssh/id_rsa.pub:ro
      - ${HOME}/.kube:/home/runner/.kube
      - ${HOME}/.certbot/log:/home/runner/.certbot/log
      - ${HOME}/.certbot/config:/home/runner/.certbot/config
      - ${HOME}/.certbot/work:/home/runner/.certbot/work